# Config file for [air](https://github.com/cosmtrek/air) in TOML format

# Working directory
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  entrypoint = "tmp/bin/main"
  cmd = "go build -tags dev -o tmp/bin/main"
  delay = 1000
  exclude_dir = ["postgres", "data", "node_modules", "views/libs/datastar/node_modules", "views/libs/lit-html/node_modules"]
  exclude_file = []
  exclude_patterns = ["**_test.go"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_patterns = []
  kill_delay = "0s"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
